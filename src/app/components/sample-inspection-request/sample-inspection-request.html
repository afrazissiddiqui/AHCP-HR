<!-- app.component.html -->

<div id="sdk---sample--header"
  class="sapMIBar sapMIBar-CTX sapMBar sapMContent-CTX sapMBar-CTX sapContrast sapContrastPlus sapMSubHeader-CTX sapMBarTitleAlignNone"
  role="toolbar">

  <!-- Left Section -->
  <div class="sapMBarLeft sapMBarContainer">

    <button class="sapMBtnBase sapMBtn sapMBarChild" aria-label="Back to samples" title="Back to samples">
      <span class="sapMBtnInner sapMBtnHoverable sapMFocusable sapMBtnBack sapMBtnIconFirst">
        <span class="sapUiIcon sapMBtnIcon sapMBtnIconLeft">
          ←
        </span>
      </span>
    </button>

  </div>

  <!-- Middle Section -->
  <div class="sapMBarMiddle">

    <div class="sapMBarPH sapMBarContainer" style="left: 52px; position: absolute; width: 251px;">
      <h1 class="sapMTitle sapMTitleStyleAuto sapMTitleNoWrap sapMTitleMaxWidth sapMBarChild"
        title="Sample: Table - with personalization">
        Sample: Table - with personalization
      </h1>
    </div>

  </div>

  <!-- Right Section -->
  <div class="sapMBarRight sapMBarContainer">

    <!-- Info Button -->
    <button class="sapMBtnBase sapMBtn sapMBarChild" title="Sample information">
      <span class="sapMBtnInner sapMBtnHoverable sapMFocusable">
        ℹ
      </span>
    </button>

    <!-- API Reference -->
    <button class="sapMBtnBase sapMBtn sapMBtnInverted sapMBarChild">
      <span class="sapMBtnInner sapMBtnHoverable sapMFocusable sapMBtnText sapMBtnEmphasized">
        API Reference
      </span>
    </button>

    <!-- Previous -->
    <button class="sapMBtnBase sapMBtn sapMBtnDisabled sapMBarChild" disabled title="Show previous sample">
      ◀
    </button>

    <!-- Next -->
    <button class="sapMBtnBase sapMBtn sapMBarChild" title="Show next sample">
      ▶
    </button>

    <!-- Full Screen -->
    <button class="sapMBtnBase sapMBtn sapMBarChild" title="Toggle Full Screen">
      ⛶
    </button>

    <!-- Adapt UI -->
    <button class="sapMBtnBase sapMBtn sapMBarChild" title="Adapt UI">
      ⚙
    </button>

    <!-- Show Code -->
    <button class="sapMBtnBase sapMBtn sapMBarChild" title="Show source code">
      &lt;/&gt;
    </button>

    <!-- New Tab -->
    <button class="sapMBtnBase sapMBtn sapMBarChild" title="Open in new tab">
      ↗
    </button>

    <!-- Settings -->
    <button class="sapMBtnBase sapMBtn sapMBarChild" title="Settings">
      ⚙
    </button>

    <!-- Download -->
    <button class="sapMBtnBase sapMBtn sapMBarChild">
      ⬇ Download
    </button>

  </div>

</div>
