<div class="payroll-master-view tax-allowance-view">
  <app-page-toolbar [showSidebarToggle]="true" (sidebarToggle)="toggleSidebar()"></app-page-toolbar>

  <div class="tax-allowance-table-wrapper">
    <table class="tax-allowance-table">
      <thead>
        <tr>
          <th class="col-field">Field</th>
          <th class="col-checkbox">Checkbox</th>
          <th class="col-gl">GL Code</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of taxAllowance.rows()">
          <td class="col-field">{{ row.label }}</td>
          <td class="col-checkbox">
            <input
              type="checkbox"
              [checked]="row.enabled"
              (change)="onCheckboxChange(row, $event)"
              [attr.aria-label]="'Enable ' + row.label"
            />
          </td>
          <td class="col-gl">
            <input
              type="text"
              class="tax-allowance-gl-input"
              [ngModel]="row.glCode"
              (ngModelChange)="onGlCodeChange(row.key, $event)"
              placeholder="Enter GL code"
              [attr.aria-label]="'GL Code for ' + row.label"
            />
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
