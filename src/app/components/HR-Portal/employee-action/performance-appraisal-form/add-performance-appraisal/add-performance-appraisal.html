<div class="cjs-page">
  <div class="cjs-header">
    <div class="cjs-header-left">
      <button type="button" class="cjs-back" (click)="back()" aria-label="Back">
        <span class="cjs-back-icon">❮</span>
      </button>
      <h1>{{ pageTitle }}</h1>
    </div>
  </div>

  <div class="cjs-card">
    <div class="cjs-form-container">
      <section class="cjs-section-block" id="pa-info-section">
        <div class="cjs-section-title">Performance Appraisal Information</div>

        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Form Number:</label>
              <input type="text" [ngModel]="formNumber()" (ngModelChange)="formNumber.set($event)" placeholder="e.g. PA-2026-001" />
            </div>
            <div class="cjs-row">
              <label>Employee ID:</label>
              <div class="employee-search-wrap">
                <input
                  type="search"
                  role="combobox"
                  [attr.aria-expanded]="codeSuggestionsOpen()"
                  aria-autocomplete="list"
                  aria-controls="pa-employee-id-listbox"
                  [ngModel]="employeeId()"
                  (ngModelChange)="onEmployeeIdInput($event)"
                  (focus)="openCodeSuggestions()"
                  (blur)="onCodeInputBlur()"
                  placeholder="e.g. EMP-001"
                  autocomplete="off"
                  [readonly]="!!editingId"
                />
                <ul
                  id="pa-employee-id-listbox"
                  class="employee-search-suggestions"
                  role="listbox"
                  *ngIf="!editingId && codeSuggestionsOpen() && employeeId().trim()"
                >
                  <li
                    *ngFor="let emp of codeSuggestions()"
                    role="option"
                    class="employee-search-suggestion-item"
                    (mousedown)="selectEmployeeFromSuggestion(emp)"
                  >
                    <span class="employee-search-suggestion-primary">{{ emp.code }} — {{ emp.name }}</span>
                    <span class="employee-search-suggestion-meta">{{ emp.department }} · {{ emp.designation }}</span>
                  </li>
                  <li *ngIf="codeSuggestions().length === 0" class="employee-search-suggestion-empty" role="presentation">
                    No matching employees
                  </li>
                </ul>
              </div>
            </div>
            <div class="cjs-row">
              <label>Employee Name:</label>
              <div class="employee-search-wrap">
                <input
                  type="search"
                  role="combobox"
                  [attr.aria-expanded]="nameSuggestionsOpen()"
                  aria-autocomplete="list"
                  aria-controls="pa-employee-name-listbox"
                  [ngModel]="employeeName()"
                  (ngModelChange)="onEmployeeNameInput($event)"
                  (focus)="openNameSuggestions()"
                  (blur)="onNameInputBlur()"
                  placeholder="Employee full name"
                  autocomplete="off"
                  [readonly]="!!editingId"
                />
                <ul
                  id="pa-employee-name-listbox"
                  class="employee-search-suggestions"
                  role="listbox"
                  *ngIf="!editingId && nameSuggestionsOpen() && employeeName().trim()"
                >
                  <li
                    *ngFor="let emp of nameSuggestions()"
                    role="option"
                    class="employee-search-suggestion-item"
                    (mousedown)="selectEmployeeFromSuggestion(emp)"
                  >
                    <span class="employee-search-suggestion-primary">{{ emp.name }} — {{ emp.code }}</span>
                    <span class="employee-search-suggestion-meta">{{ emp.department }} · {{ emp.designation }}</span>
                  </li>
                  <li *ngIf="nameSuggestions().length === 0" class="employee-search-suggestion-empty" role="presentation">
                    No matching employees
                  </li>
                </ul>
              </div>
            </div>
            <div class="cjs-row">
              <label>Employee Category:</label>
              <input type="text" [ngModel]="employeeCategory()" (ngModelChange)="employeeCategory.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Work / Grade Level:</label>
              <input type="text" [ngModel]="workGradeLevel()" (ngModelChange)="workGradeLevel.set($event)" placeholder="e.g. GWL-5" />
            </div>
            <div class="cjs-row">
              <label>Employment Nature:</label>
              <input type="text" [ngModel]="employmentNature()" (ngModelChange)="employmentNature.set($event)" placeholder="e.g. Permanent" />
            </div>
            <div class="cjs-row">
              <label>Department:</label>
              <input type="text" [ngModel]="department()" (ngModelChange)="department.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Designation:</label>
              <input type="text" [ngModel]="designation()" (ngModelChange)="designation.set($event)" />
            </div>
          </div>

          <div class="cjs-col">
            <div class="cjs-row">
              <label>Date of Joining:</label>
              <input type="date" [ngModel]="dateOfJoining()" (ngModelChange)="dateOfJoining.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Employment Type:</label>
              <input type="text" [ngModel]="employmentType()" (ngModelChange)="employmentType.set($event)" placeholder="e.g. Full Time" />
            </div>
            <div class="cjs-row">
              <label>Job Title:</label>
              <input type="text" [ngModel]="jobTitle()" (ngModelChange)="jobTitle.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Reporting Manager:</label>
              <input type="text" [ngModel]="reportingManager()" (ngModelChange)="reportingManager.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Appraisal Authority:</label>
              <input type="text" [ngModel]="appraisalAuthority()" (ngModelChange)="appraisalAuthority.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Appraisal Period:</label>
              <input type="text" [ngModel]="appraisalPeriod()" (ngModelChange)="appraisalPeriod.set($event)" placeholder="e.g. Jan 2025 - Dec 2025" />
            </div>
            <div class="cjs-row">
              <label>Current Salary:</label>
              <input type="number" min="0" [ngModel]="currentSalary()" (ngModelChange)="currentSalary.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Evaluation Date:</label>
              <input type="date" [ngModel]="evaluationDate()" (ngModelChange)="evaluationDate.set($event)" />
            </div>
          </div>
        </div>
      </section>

      <section class="cjs-section-block" id="pa-increment-section">
        <div class="cjs-section-title">Increment</div>
        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Current Salary:</label>
              <input type="number" min="0" [ngModel]="currentSalary()" (ngModelChange)="currentSalary.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Increment Percentage:</label>
              <input type="number" min="0" step="0.1" [ngModel]="incrementPercentage()" (ngModelChange)="onIncrementPercentageChange($event)" />
            </div>
            <div class="cjs-row">
              <label>Increment Effective Date:</label>
              <input type="date" [ngModel]="incrementEffectiveDate()" (ngModelChange)="incrementEffectiveDate.set($event)" />
            </div>
          </div>
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Reason for Increment:</label>
              <input type="text" [ngModel]="reasonForIncrement()" (ngModelChange)="reasonForIncrement.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Increment Amount:</label>
              <input type="number" min="0" [ngModel]="incrementAmount()" (ngModelChange)="onIncrementAmountChange($event)" />
            </div>
            <div class="cjs-row">
              <label>Revised Salary:</label>
              <input type="text" [value]="revisedSalary()" readonly />
            </div>
          </div>
        </div>
      </section>

      <section class="cjs-section-block" id="pa-promotion-section">
        <div class="cjs-section-title">Promotion</div>
        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Promotion Recommended:</label>
              <select [ngModel]="promotionRecommended()" (ngModelChange)="promotionRecommended.set($event)">
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
            <div class="cjs-row">
              <label>New Designation:</label>
              <input type="text" [ngModel]="newDesignation()" (ngModelChange)="newDesignation.set($event)" />
            </div>
          </div>
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Promotion Effective Date:</label>
              <input type="date" [ngModel]="promotionEffectiveDate()" (ngModelChange)="promotionEffectiveDate.set($event)" />
            </div>
            <div class="cjs-row">
              <label>Remarks:</label>
              <input type="text" [ngModel]="promotionRemarks()" (ngModelChange)="promotionRemarks.set($event)" />
            </div>
          </div>
        </div>
      </section>

      <section class="cjs-section-block" id="pa-other-benefits-section">
        <div class="cjs-section-title">Other Benefits</div>
        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row cjs-row--full">
              <label>Existing Benefits Details:</label>
              <textarea rows="4" [ngModel]="existingBenefitsDetails()" (ngModelChange)="existingBenefitsDetails.set($event)"></textarea>
            </div>
          </div>
          <div class="cjs-col">
            <div class="cjs-row cjs-row--full">
              <label>New Benefits:</label>
              <textarea rows="4" [ngModel]="newBenefits()" (ngModelChange)="newBenefits.set($event)"></textarea>
            </div>
          </div>
        </div>
      </section>

      <div class="cjs-actions-footer">
        <button type="button" class="cjs-submit-btn" (click)="save()">
          <span class="cjs-submit-icon">✓</span> {{ submitButtonLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
