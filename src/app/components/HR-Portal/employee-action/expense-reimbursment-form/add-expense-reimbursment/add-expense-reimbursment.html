<div class="cjs-page">
  <div class="cjs-header">
    <div class="cjs-header-left">
      <button type="button" class="cjs-back" (click)="back()" aria-label="Back">
        <span class="cjs-back-icon">❮</span>
      </button>
      <h1>{{ pageTitle }}</h1>
    </div>
  </div>

  <div class="cjs-card">
    <div class="cjs-form-container">
      <section class="cjs-section-block" id="er-header-section">
        <div class="cjs-section-title">headerFields</div>
        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>employeeCode:</label>
              <div class="employee-search-wrap">
                <input
                  type="search"
                  [ngModel]="employeeCode()"
                  (ngModelChange)="onEmployeeCodeInput($event)"
                  (focus)="openCodeSuggestions()"
                  (blur)="onCodeInputBlur()"
                  placeholder="EMP-001"
                  autocomplete="off"
                  [readonly]="!!editingId"
                />
                <ul class="employee-search-suggestions" role="listbox" *ngIf="!editingId && codeSuggestionsOpen() && employeeCode().trim()">
                  <li *ngFor="let emp of codeSuggestions()" role="option" class="employee-search-suggestion-item" (mousedown)="selectEmployeeFromSuggestion(emp)">
                    <span class="employee-search-suggestion-primary">{{ emp.code }} — {{ emp.name }}</span>
                    <span class="employee-search-suggestion-meta">{{ emp.department }} · {{ emp.designation }}</span>
                  </li>
                </ul>
              </div>
            </div>
            <div class="cjs-row">
              <label>employeeName:</label>
              <div class="employee-search-wrap">
                <input
                  type="search"
                  [ngModel]="headerEmployeeName()"
                  (ngModelChange)="onHeaderEmployeeNameInput($event)"
                  (focus)="openNameSuggestions()"
                  (blur)="onNameInputBlur()"
                  placeholder="Muhammad Khan"
                  autocomplete="off"
                  [readonly]="!!editingId"
                />
                <ul class="employee-search-suggestions" role="listbox" *ngIf="!editingId && nameSuggestionsOpen() && headerEmployeeName().trim()">
                  <li *ngFor="let emp of nameSuggestions()" role="option" class="employee-search-suggestion-item" (mousedown)="selectEmployeeFromSuggestion(emp)">
                    <span class="employee-search-suggestion-primary">{{ emp.name }} — {{ emp.code }}</span>
                  </li>
                </ul>
              </div>
            </div>
            <div class="cjs-row">
              <label>department:</label>
              <input type="text" [ngModel]="headerDepartment()" (ngModelChange)="onHeaderDepartmentInput($event)" placeholder="IT" />
            </div>
            <div class="cjs-row">
              <label>designation:</label>
              <input type="text" [ngModel]="designation()" (ngModelChange)="designation.set($event)" placeholder="Software Developer" />
            </div>
          </div>
          <div class="cjs-col">
            <div class="cjs-row">
              <label>costCenter:</label>
              <input type="text" [ngModel]="costCenter()" (ngModelChange)="costCenter.set($event)" placeholder="CC-1001" />
            </div>
            <div class="cjs-row">
              <label>claimMonth:</label>
              <input type="date" [ngModel]="claimMonth()" (ngModelChange)="claimMonth.set($event)" />
            </div>
            <div class="cjs-row">
              <label>formNumber:</label>
              <input type="text" [ngModel]="formNumber()" (ngModelChange)="onFormNumberChange($event)" placeholder="FRM-1001" />
            </div>
            <div class="cjs-row">
              <label>submissionDate:</label>
              <input type="date" [ngModel]="submissionDate()" (ngModelChange)="submissionDate.set($event)" />
            </div>
          </div>
        </div>
      </section>

      <section class="cjs-section-block" id="er-expense-detail-section">
        <div class="cjs-section-title">expenseDetail</div>
        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>formNumber:</label>
              <input type="text" [value]="formNumber()" readonly placeholder="FRM-1001" />
            </div>
            <div class="cjs-row">
              <label>employeeID:</label>
              <input type="text" [ngModel]="employeeId()" (ngModelChange)="employeeId.set($event)" placeholder="EMP-001" />
            </div>
            <div class="cjs-row">
              <label>employeeName:</label>
              <input type="text" [ngModel]="detailEmployeeName()" (ngModelChange)="onDetailEmployeeNameInput($event)" />
            </div>
            <div class="cjs-row">
              <label>department:</label>
              <input type="text" [ngModel]="detailDepartment()" (ngModelChange)="detailDepartment.set($event)" />
            </div>
            <div class="cjs-row">
              <label>expenseType:</label>
              <select [ngModel]="expenseType()" (ngModelChange)="expenseType.set($event)">
                <option value="">Select expenseType</option>
                @for (type of expenseTypeOptions; track type) {
                  <option [value]="type">{{ type }}</option>
                }
              </select>
            </div>
          </div>
          <div class="cjs-col">
            <div class="cjs-row">
              <label>claimAmount:</label>
              <input type="text" [ngModel]="claimAmount()" (ngModelChange)="claimAmount.set($event)" placeholder="5000" />
            </div>
            <div class="cjs-row">
              <label>claimDate:</label>
              <input type="date" [ngModel]="claimDate()" (ngModelChange)="claimDate.set($event)" />
            </div>
            <div class="cjs-row">
              <label>approvalStatus:</label>
              <select [ngModel]="approvalStatus()" (ngModelChange)="approvalStatus.set($event)">
                @for (status of approvalStatusOptions; track status) {
                  <option [value]="status">{{ status }}</option>
                }
              </select>
            </div>
          </div>
        </div>
        <div class="cjs-row cjs-row--full">
          <label>remarks:</label>
          <textarea rows="3" [ngModel]="expenseRemarks()" (ngModelChange)="expenseRemarks.set($event)" placeholder="Client visit expense"></textarea>
        </div>
      </section>

      <section class="cjs-section-block" id="er-travel-section">
        <div class="cjs-section-title">travel</div>
        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>travelFromDate:</label>
              <input type="date" [ngModel]="travelFromDate()" (ngModelChange)="travelFromDate.set($event)" />
            </div>
            <div class="cjs-row">
              <label>travelToDate:</label>
              <input type="date" [ngModel]="travelToDate()" (ngModelChange)="travelToDate.set($event)" />
            </div>
            <div class="cjs-row">
              <label>dailyAllowanceApplicable:</label>
              <select [ngModel]="dailyAllowanceApplicable()" (ngModelChange)="dailyAllowanceApplicable.set($event)">
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
          </div>
          <div class="cjs-col">
            <div class="cjs-row">
              <label>dailyAllowanceRate:</label>
              <input type="text" [ngModel]="dailyAllowanceRate()" (ngModelChange)="dailyAllowanceRate.set($event)" placeholder="3000" [disabled]="dailyAllowanceApplicable() !== 'Yes'" />
            </div>
            <div class="cjs-row">
              <label>numberOfDays:</label>
              <input type="text" [value]="numberOfDays()" readonly />
            </div>
            <div class="cjs-row">
              <label>dailyAllowanceAmount:</label>
              <input type="text" [value]="dailyAllowanceAmount()" readonly />
            </div>
          </div>
        </div>
        <div class="cjs-row cjs-row--full">
          <label>remarks:</label>
          <textarea rows="3" [ngModel]="travelRemarks()" (ngModelChange)="travelRemarks.set($event)" placeholder="Official travel"></textarea>
        </div>
      </section>

      <div class="cjs-actions-footer">
        <button type="button" class="cjs-submit-btn" (click)="save()">
          <span class="cjs-submit-icon">✓</span> {{ submitButtonLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
