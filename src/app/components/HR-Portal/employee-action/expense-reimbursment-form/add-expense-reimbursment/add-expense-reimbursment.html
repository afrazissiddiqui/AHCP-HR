<div class="cjs-page">
  <div class="cjs-header">
    <div class="cjs-header-left">
      <button type="button" class="cjs-back" (click)="back()" aria-label="Back">
        <span class="cjs-back-icon">❮</span>
      </button>
      <h1>{{ pageTitle }}</h1>
    </div>
  </div>

  <div class="cjs-card">
    <div class="cjs-form-container">
      <section class="cjs-section-block" id="er-header-section">
        <div class="cjs-section-title">Header Information</div>

        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Employee Code:</label>
              <div class="employee-search-wrap">
                <input
                  type="search"
                  role="combobox"
                  [attr.aria-expanded]="codeSuggestionsOpen()"
                  aria-autocomplete="list"
                  aria-controls="er-employee-code-listbox"
                  [ngModel]="employeeCode()"
                  (ngModelChange)="onEmployeeCodeInput($event)"
                  (focus)="openCodeSuggestions()"
                  (blur)="onCodeInputBlur()"
                  placeholder="e.g. EMP-001"
                  autocomplete="off"
                  [readonly]="!!editingId"
                />
                <ul
                  id="er-employee-code-listbox"
                  class="employee-search-suggestions"
                  role="listbox"
                  *ngIf="!editingId && codeSuggestionsOpen() && employeeCode().trim()"
                >
                  <li
                    *ngFor="let emp of codeSuggestions()"
                    role="option"
                    class="employee-search-suggestion-item"
                    (mousedown)="selectEmployeeFromSuggestion(emp)"
                  >
                    <span class="employee-search-suggestion-primary">{{ emp.code }} — {{ emp.name }}</span>
                    <span class="employee-search-suggestion-meta">{{ emp.department }} · {{ emp.designation }}</span>
                  </li>
                  <li *ngIf="codeSuggestions().length === 0" class="employee-search-suggestion-empty" role="presentation">
                    No matching employees
                  </li>
                </ul>
              </div>
            </div>

            <div class="cjs-row">
              <label>Employee Name:</label>
              <div class="employee-search-wrap">
                <input
                  type="search"
                  role="combobox"
                  [attr.aria-expanded]="nameSuggestionsOpen()"
                  aria-autocomplete="list"
                  aria-controls="er-employee-name-listbox"
                  [ngModel]="headerEmployeeName()"
                  (ngModelChange)="onHeaderEmployeeNameInput($event)"
                  (focus)="openNameSuggestions()"
                  (blur)="onNameInputBlur()"
                  placeholder="Employee full name"
                  autocomplete="off"
                  [readonly]="!!editingId"
                />
                <ul
                  id="er-employee-name-listbox"
                  class="employee-search-suggestions"
                  role="listbox"
                  *ngIf="!editingId && nameSuggestionsOpen() && headerEmployeeName().trim()"
                >
                  <li
                    *ngFor="let emp of nameSuggestions()"
                    role="option"
                    class="employee-search-suggestion-item"
                    (mousedown)="selectEmployeeFromSuggestion(emp)"
                  >
                    <span class="employee-search-suggestion-primary">{{ emp.name }} — {{ emp.code }}</span>
                    <span class="employee-search-suggestion-meta">{{ emp.department }} · {{ emp.designation }}</span>
                  </li>
                  <li *ngIf="nameSuggestions().length === 0" class="employee-search-suggestion-empty" role="presentation">
                    No matching employees
                  </li>
                </ul>
              </div>
            </div>

            <div class="cjs-row">
              <label>Department:</label>
              <input type="text" [ngModel]="headerDepartment()" (ngModelChange)="onHeaderDepartmentInput($event)" />
            </div>

            <div class="cjs-row">
              <label>Designation:</label>
              <input type="text" [ngModel]="designation()" (ngModelChange)="designation.set($event)" />
            </div>
          </div>

          <div class="cjs-col">
            <div class="cjs-row">
              <label>Cost Center:</label>
              <input type="text" [ngModel]="costCenter()" (ngModelChange)="costCenter.set($event)" placeholder="e.g. CC-1001" />
            </div>

            <div class="cjs-row">
              <label>Claim Month:</label>
              <input type="date" [ngModel]="claimMonth()" (ngModelChange)="claimMonth.set($event)" />
            </div>

            <div class="cjs-row">
              <label>Form Number:</label>
              <input type="text" [ngModel]="formNumber()" (ngModelChange)="onFormNumberChange($event)" placeholder="e.g. FRM-1001" />
            </div>

            <div class="cjs-row">
              <label>Submission Date:</label>
              <input type="date" [ngModel]="submissionDate()" (ngModelChange)="submissionDate.set($event)" />
            </div>
          </div>
        </div>
      </section>

      <section class="cjs-section-block" id="er-expense-detail-section">
        <div class="cjs-section-title">Expense Detail</div>

        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Form Number:</label>
              <input type="text" [value]="formNumber()" readonly />
            </div>

            <div class="cjs-row">
              <label>Employee ID:</label>
              <input type="text" [ngModel]="employeeId()" (ngModelChange)="employeeId.set($event)" placeholder="e.g. EMP-001" />
            </div>

            <div class="cjs-row">
              <label>Employee Name:</label>
              <input type="text" [ngModel]="detailEmployeeName()" (ngModelChange)="onDetailEmployeeNameInput($event)" />
            </div>

            <div class="cjs-row">
              <label>Department:</label>
              <input type="text" [ngModel]="detailDepartment()" (ngModelChange)="detailDepartment.set($event)" />
            </div>

            <div class="cjs-row">
              <label>Expense Type:</label>
              <select [ngModel]="expenseType()" (ngModelChange)="expenseType.set($event)">
                <option value="">Select expense type</option>
                @for (type of expenseTypeOptions; track type) {
                  <option [value]="type">{{ type }}</option>
                }
              </select>
            </div>
          </div>

          <div class="cjs-col">
            <div class="cjs-row">
              <label>Claim Amount:</label>
              <input type="text" [ngModel]="claimAmount()" (ngModelChange)="claimAmount.set($event)" placeholder="e.g. 5000" />
            </div>

            <div class="cjs-row">
              <label>Claim Date:</label>
              <input
                type="text"
                [ngModel]="claimDate()"
                (ngModelChange)="onClaimDateChange($event)"
                placeholder="DD/MM/YYYY"
                inputmode="numeric"
                maxlength="10"
              />
            </div>

          </div>
        </div>

        <div class="cjs-row cjs-row--full">
          <label>Remarks:</label>
          <textarea rows="3" [ngModel]="expenseRemarks()" (ngModelChange)="expenseRemarks.set($event)" placeholder="Expense remarks"></textarea>
        </div>
      </section>

      <section class="cjs-section-block" id="er-travel-section">
        <div class="cjs-section-title">Travel</div>

        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Travel From Date:</label>
              <input type="date" [ngModel]="travelFromDate()" (ngModelChange)="travelFromDate.set($event)" />
            </div>

            <div class="cjs-row">
              <label>Travel To Date:</label>
              <input type="date" [ngModel]="travelToDate()" (ngModelChange)="travelToDate.set($event)" />
            </div>

            <div class="cjs-row">
              <label>Daily Allowance Applicable:</label>
              <select [ngModel]="dailyAllowanceApplicable()" (ngModelChange)="dailyAllowanceApplicable.set($event)">
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
          </div>

          <div class="cjs-col">
            <div class="cjs-row">
              <label>Daily Allowance Rate:</label>
              <input
                type="text"
                [ngModel]="dailyAllowanceRate()"
                (ngModelChange)="dailyAllowanceRate.set($event)"
                placeholder="e.g. 3000"
                [disabled]="dailyAllowanceApplicable() !== 'Yes'"
              />
            </div>

            <div class="cjs-row">
              <label>Number of Days:</label>
              <input type="text" [value]="numberOfDays()" readonly />
            </div>

            <div class="cjs-row">
              <label>Daily Allowance Amount:</label>
              <input type="text" [value]="dailyAllowanceAmount()" readonly />
            </div>
          </div>
        </div>

        <div class="cjs-row cjs-row--full">
          <label>Remarks:</label>
          <textarea rows="3" [ngModel]="travelRemarks()" (ngModelChange)="travelRemarks.set($event)" placeholder="Travel remarks"></textarea>
        </div>
      </section>

      <div class="cjs-actions-footer">
        <button type="button" class="cjs-submit-btn" (click)="save()">
          <span class="cjs-submit-icon">✓</span> {{ submitButtonLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
