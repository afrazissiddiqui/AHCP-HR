<div class="cjr-page">
  <div class="cjr-header">
    <div class="cjr-header-left">
      <button type="button" class="cjr-back" (click)="back()" aria-label="Back">
        <span class="cjr-back-icon">❮</span>
      </button>
      <h1>Add Leave Request</h1>
    </div>
  </div>

  <div class="cjr-card">
    <div class="cjr-options">
      <div class="cjr-options-title">Options:</div>
    </div>

    <nav class="cjr-section-nav" aria-label="Leave request sections">
      <ul class="cjr-section-nav-list">
        <li class="cjr-section-nav-item" [class.cjr-section-nav-item--active]="activeSection() === 'header-info-section'"
          (click)="scrollToSection('header-info-section')">Header info</li>
        <li class="cjr-section-nav-item" [class.cjr-section-nav-item--active]="activeSection() === 'leave-detail-section'"
          (click)="scrollToSection('leave-detail-section')">Leave request</li>
        <li class="cjr-section-nav-item" [class.cjr-section-nav-item--active]="activeSection() === 'leave-balance-information-section'"
          (click)="scrollToSection('leave-balance-information-section')">Leave balance information</li>
      </ul>
    </nav>

    <div class="cjr-personal" id="header-info-section">
      <div class="cjr-section-title">Header info</div>
      <div class="cjr-personal-grid">
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Form Number:</label>
            <input type="text" [ngModel]="formNumber()" (ngModelChange)="formNumber.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Employee ID:</label>
            <input type="text" [ngModel]="employeeId()" (ngModelChange)="employeeId.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Employee Name:</label>
            <input type="text" [ngModel]="employeeName()" (ngModelChange)="employeeName.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Employee Category:</label>
            <input type="text" [ngModel]="employeeCategory()" (ngModelChange)="employeeCategory.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Employment Nature:</label>
            <input type="text" [ngModel]="employmentNature()" (ngModelChange)="employmentNature.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Employment Type:</label>
            <input type="text" [ngModel]="employmentType()" (ngModelChange)="employmentType.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Work / Grade Level:</label>
            <input type="text" [ngModel]="workGradeLevel()" (ngModelChange)="workGradeLevel.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Department:</label>
            <input type="text" [ngModel]="department()" (ngModelChange)="department.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Job Title:</label>
            <input type="text" [ngModel]="jobTitle()" (ngModelChange)="jobTitle.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Location:</label>
            <input type="text" [ngModel]="location()" (ngModelChange)="location.set($event)" />
          </div>
        </div>
      </div>
    </div>

    <div class="cjr-personal" id="leave-detail-section">
      <div class="cjr-section-title">Leave request</div>
      <div class="cjr-personal-grid">
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Request Date:</label>
            <input type="date" [ngModel]="requestDate()" (ngModelChange)="requestDate.set($event)" />
          </div>
          <div class="cjr-row">
            <label>Leave Type:</label>
            <input type="text" [ngModel]="leaveType()" (ngModelChange)="leaveType.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Cause of Leave:</label>
            <input type="text" [ngModel]="causeOfLeave()" (ngModelChange)="causeOfLeave.set($event)" />
          </div>
          <div class="cjr-row">
            <label>From Date:</label>
            <input type="date" [ngModel]="fromDate()" (ngModelChange)="fromDate.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>To Date:</label>
            <input type="date" [ngModel]="toDate()" (ngModelChange)="toDate.set($event)" />
          </div>
          <div class="cjr-row">
            <label>Total Leave Days Requested:</label>
            <input type="number" min="0" step="0.5" [ngModel]="totalLeaveDaysRequested()" (ngModelChange)="totalLeaveDaysRequested.set($event)" />
          </div>
        </div>
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Request Status:</label>
            <select [ngModel]="requestStatus()" (ngModelChange)="requestStatus.set($event)">
              <option value="">Select option</option>
              <option value="Submitted">Submitted</option>
              <option value="Approved">Approved</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
          <div class="cjr-row">
            <label>Remarks:</label>
            <input type="text" [ngModel]="remarks()" (ngModelChange)="remarks.set($event)" />
          </div>
        </div>
      </div>
    </div>

    <div class="cjr-personal" id="leave-balance-information-section">
      <div class="cjr-section-title">Leave balance information</div>
      <div class="cjr-personal-grid">
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label>Total Leaves:</label>
            <input type="number" min="0" [ngModel]="totalLeaves()" (ngModelChange)="totalLeaves.set($event)" />
          </div>
          <div class="cjr-row">
            <label>Leaves Availed:</label>
            <input type="number" min="0" [ngModel]="leavesAvailed()" (ngModelChange)="leavesAvailed.set($event)" />
          </div>
          <div class="cjr-row">
            <label>Remaining Leaves:</label>
            <input type="number" min="0" [ngModel]="remainingLeaves()" (ngModelChange)="remainingLeaves.set($event)" />
          </div>
        </div>
      </div>
    </div>

    <div class="cjr-actions-footer">
      <button type="button" class="cjr-submit-btn" (click)="save()">
        <span class="cjr-submit-icon">✓</span> Save Leave Request
      </button>
    </div>
  </div>
</div>
