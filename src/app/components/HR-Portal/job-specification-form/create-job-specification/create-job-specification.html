<div class="cjs-page">
  <div class="cjs-header">
    <div class="cjs-header-left">
      <button type="button" class="cjs-back" (click)="back()" aria-label="Back">
        <span class="cjs-back-icon">❮</span>
      </button>
      <h1>{{ pageTitle }}</h1>
    </div>
  </div>

  <div class="cjs-card">
    <div class="cjs-form-container">
      <section class="cjs-section-block">
        <div class="cjs-section-title">Job Specification Details</div>

        <div class="cjs-grid">
          <!-- Left Column -->
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Job Title:</label>
              <input type="text" [(ngModel)]="jobTitle" placeholder="Position title" />
            </div>

            <div class="cjs-row">
              <label>Department:</label>
              <select [(ngModel)]="department">
                <option value="">No Selection</option>
                @for (dept of departmentOptions; track dept) {
                <option [value]="dept">{{ dept }}</option>
                }
              </select>
            </div>

            <div class="cjs-row">
              <label>Vacancy Count:</label>
              <input type="number" [(ngModel)]="vacancyCount" placeholder="Number of positions" />
            </div>

            <div class="cjs-row">
              <label>Job Purpose/ Description:</label>
              <textarea [(ngModel)]="jobDescription" placeholder="Role description"></textarea>
            </div>

            <div class="cjs-row">
              <label>Experience Requirement:</label>
              <input
                type="number"
                [(ngModel)]="experienceYears"
                min="0"
                step="1"
                inputmode="numeric"
                placeholder="Enter number of years"
                (keydown)="preventNonNumericExperienceInput($event)"
              />
            </div>
          </div>

          <!-- Right Column -->
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Employment Category:</label>
              <select [(ngModel)]="employmentCategory">
                <option value="">No Selection</option>
                <option value="Executive">Executive</option>
                <option value="Non-Executive">Non-Executive</option>
              </select>
            </div>

            <div class="cjs-row">
              <label>Employment Nature:</label>
              <select [(ngModel)]="employmentNature">
                <option value="">No Selection</option>
                <option value="Technical">Technical</option>
                <option value="Non-Technical">Non-Technical</option>
              </select>
            </div>

            <div class="cjs-row">
              <label>Employment Type:</label>
              <select [(ngModel)]="employmentType">
                <option value="">No Selection</option>
                <option value="Permanent">Permanent</option>
                <option value="Temporary">Contractual</option>
              </select>
            </div>

            <div class="cjs-row">
              <label>Grade / Work Level:</label>
              <select [(ngModel)]="gradeWorkLevel">
                <option value="">No Selection</option>
                @for (level of gradeWorkLevelOptions; track level) {
                <option [value]="level">{{ level }}</option>
                }
              </select>
            </div>

            <div class="cjs-row">
              <label>Key Responsibility:</label>
              <textarea [(ngModel)]="keyResponsibilities" placeholder="Key responsibilities of the role"></textarea>
            </div>
          </div>
        </div>
      </section>

      <section class="cjs-section-block">
        <div class="cjs-section-title">Remuneration Details</div>
        <div class="cjs-grid">
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Basic Salary:</label>
              <input
                type="text"
                inputmode="decimal"
                [ngModel]="basicSalary"
                (ngModelChange)="onSalaryInput($event, 'basicSalary')"
                (keydown)="onDecimalKeyDown($event)"
                placeholder="Enter basic salary"
              />
            </div>
            <div class="cjs-row">
              <label>Medical Allowance:</label>
              <input
                type="text"
                inputmode="decimal"
                [ngModel]="medicalAllowance"
                (ngModelChange)="onSalaryInput($event, 'medicalAllowance')"
                (keydown)="onDecimalKeyDown($event)"
                placeholder="Enter medical allowance"
              />
            </div>
          </div>
          <div class="cjs-col">
            <div class="cjs-row">
              <label>Fuel Allowance:</label>
              <input
                type="text"
                inputmode="decimal"
                [ngModel]="fuelAllowance"
                (ngModelChange)="onSalaryInput($event, 'fuelAllowance')"
                (keydown)="onDecimalKeyDown($event)"
                placeholder="Enter fuel allowance"
              />
            </div>
            <div class="cjs-row">
              <label>Package / Perks:</label>
              <textarea [(ngModel)]="packagePerks" placeholder="Enter other perks and benefits"></textarea>
            </div>
          </div>
        </div>
      </section>

      <section class="cjs-section-block">
        <div class="cjs-section-title">Qualification Requirements</div>
        <div class="cjs-qualification-list">
          <div class="cjs-row" *ngFor="let qual of qualifications; let i = index; trackBy: trackByIndex">
            <label>Minimum Education Requirement:</label>
            <div class="cjs-input-with-actions">
              <input type="text" [(ngModel)]="qualifications[i]" placeholder="Education degree / certification" />
              <button type="button" class="cjs-add-btn" (click)="addQualification()"
                *ngIf="i === qualifications.length - 1">+</button>
              <button type="button" class="cjs-remove-btn" (click)="removeQualification(i)"
                *ngIf="qualifications.length > 1">-</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="cjs-actions-footer">
      <button type="button" class="cjs-submit-btn" (click)="submitForm()">
        <span class="cjs-submit-icon">✓</span> {{ submitButtonLabel }}
      </button>
    </div>
  </div>
</div>
