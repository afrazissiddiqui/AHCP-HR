<div class="itr-add-page cjr-page scd-add-page">
  <div class="itr-add-scroll">
    <div class="cjr-header itr-add-header">
      <div class="cjr-header-left">
        <button type="button" class="cjr-back" (click)="back()" aria-label="Back">
          <span class="cjr-back-icon">❮</span>
        </button>
        <h1>{{ pageTitle() }}</h1>
      </div>
    </div>

    <div class="cjr-card scd-form-card itr-form-card">
      <div class="cjr-personal itr-form-body" id="itr-form-header-section">
        <div class="itr-form-card-head">
          <div class="cjr-section-title">ITR Form</div>
          <p class="itr-form-card-head__hint">
            Select a machine with replacement items, then complete the date, warehouse, and remarks details.
          </p>
        </div>

        <div class="itr-form-sections">
          <section class="itr-form-section">
            <h3 class="itr-form-section__title">Machine</h3>
            <div class="itr-form-fields">
              <div class="itr-field">
                <label class="itr-field__label" for="husky-machine-id">Machine ID</label>
                <select
                  id="husky-machine-id"
                  class="mad-select itr-field__control"
                  [ngModel]="machineId()"
                  (ngModelChange)="onMachineIdChange($event)"
                  name="machineId"
                >
                  <option value="">Select machine</option>
                  <option *ngFor="let machine of machineOptions()" [value]="machine.machineId">
                    {{ machine.machineId }} — {{ machine.machineName }}
                  </option>
                </select>
              </div>
            </div>
          </section>

          <section class="itr-form-section">
            <h3 class="itr-form-section__title">Dates &amp; Warehouses</h3>
            <div class="itr-form-fields">
              <div class="itr-field">
                <label class="itr-field__label" for="husky-posting-date">Posting Date</label>
                <input
                  id="husky-posting-date"
                  type="date"
                  class="itr-field__control"
                  [ngModel]="postingDate()"
                  (ngModelChange)="onPostingDateChange($event)"
                  name="postingDate"
                />
              </div>

              <div class="itr-field">
                <label class="itr-field__label" for="husky-doc-date">Doc Date</label>
                <input
                  id="husky-doc-date"
                  type="date"
                  class="itr-field__control"
                  [ngModel]="docDate()"
                  (ngModelChange)="onDocDateChange($event)"
                  name="docDate"
                />
              </div>

              <div class="itr-field">
                <label class="itr-field__label" for="husky-from-warehouse">From Warehouse</label>
                <select
                  id="husky-from-warehouse"
                  class="itr-field__control itr-field__control--table"
                  [ngModel]="fromWarehouseCode()"
                  (ngModelChange)="onFromWarehouseChange($event)"
                  name="fromWarehouseCode"
                >
                  <option value="">Select warehouse</option>
                  <option
                    *ngFor="let warehouse of warehouseOptions()"
                    [value]="warehouse.warehouseCode"
                  >
                    {{ warehouse.warehouseName }}
                  </option>
                </select>
              </div>

              <div class="itr-field">
                <label class="itr-field__label" for="husky-to-warehouse">To Warehouse</label>
                <select
                  id="husky-to-warehouse"
                  class="itr-field__control itr-field__control--table"
                  [ngModel]="toWarehouseCode()"
                  (ngModelChange)="onToWarehouseChange($event)"
                  name="toWarehouseCode"
                >
                  <option value="">Select warehouse</option>
                  <option
                    *ngFor="let warehouse of warehouseOptions()"
                    [value]="warehouse.warehouseCode"
                  >
                    {{ warehouse.warehouseName }}
                  </option>
                </select>
              </div>
            </div>
          </section>

          <section class="itr-form-section" *ngIf="!isCreateMode()">
            <h3 class="itr-form-section__title">Document Info</h3>
            <div class="itr-form-fields itr-form-fields--readonly">
              <div class="itr-field">
                <label class="itr-field__label" for="husky-submit-date">Submit Date</label>
                <input
                  id="husky-submit-date"
                  type="text"
                  class="itr-field__control itr-field__control--readonly"
                  [ngModel]="submitDate()"
                  name="submitDate"
                  readonly
                  placeholder="System-generated on submit"
                />
              </div>

              <div class="itr-field">
                <label class="itr-field__label" for="husky-document-no">Document No.</label>
                <input
                  id="husky-document-no"
                  type="text"
                  class="itr-field__control itr-field__control--readonly"
                  [ngModel]="documentNo()"
                  name="documentNo"
                  readonly
                  placeholder="Auto-generated"
                />
              </div>

              <div class="itr-field">
                <label class="itr-field__label" for="husky-status">Status</label>
                <input
                  id="husky-status"
                  type="text"
                  class="itr-field__control itr-field__control--readonly"
                  [ngModel]="status()"
                  name="status"
                  readonly
                  placeholder="System-driven workflow"
                />
              </div>
            </div>
          </section>

          <section class="itr-form-section itr-form-section--remarks">
            <h3 class="itr-form-section__title">Remarks</h3>
            <div class="itr-field itr-field--full">
              <label class="itr-field__label sr-only" for="husky-remarks">Remarks</label>
              <textarea
                id="husky-remarks"
                class="itr-field__control itr-field__control--textarea"
                [ngModel]="remarks()"
                (ngModelChange)="remarks.set($event)"
                name="remarks"
                rows="3"
                placeholder="Add any notes or comments for this ITR form"
              ></textarea>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div
      class="cjr-card scd-form-card itr-replacement-card"
      *ngIf="replacementLineGroups().length > 0"
    >
      <div class="cjr-personal itr-replacement-card__body">
        <div class="itr-form-card-head itr-form-card-head--compact">
          <div class="cjr-section-title">Content</div>
        </div>

        <div
          class="itr-replacement-line-block"
          *ngFor="let group of replacementLineGroups(); let gi = index; trackBy: trackByIndex"
        >
          <div class="pmm-replacement-table-wrap itr-replacement-table-wrap">
            <table class="mountain-table pmm-replacement-table itr-replacement-table">
              <thead>
                <tr>
                  <th>Item Code</th>
                  <th>Item Name</th>
                  <th class="pmm-replacement-table__qty-col">Quantity</th>
                  <th class="itr-replacement-table__warehouse-col">From Warehouse</th>
                  <th class="itr-replacement-table__warehouse-col">To Warehouse</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of group.items; let ii = index; trackBy: trackByIndex">
                  <td>
                    <span class="itr-replacement-table__readonly">{{ item.itemCode || '—' }}</span>
                  </td>
                  <td>
                    <span class="itr-replacement-table__readonly">{{ item.itemName || '—' }}</span>
                  </td>
                  <td class="pmm-replacement-table__qty-col">
                    <input
                      type="number"
                      min="0"
                      step="any"
                      class="pmm-replacement-table__input pmm-replacement-table__input--qty"
                      [ngModel]="item.quantity"
                      (ngModelChange)="updateReplacementQuantity(gi, ii, $event)"
                      placeholder="Qty"
                      [name]="'itrReplacementQuantity' + gi + '_' + ii"
                    />
                  </td>
                  <td class="itr-replacement-table__warehouse-col">
                    <select
                      class="pmm-replacement-table__input pmm-replacement-table__input--select"
                      [ngModel]="item.fromWarehouseCode"
                      (ngModelChange)="updateReplacementFromWarehouse(gi, ii, $event)"
                      [name]="'itrReplacementFromWarehouse' + gi + '_' + ii"
                    >
                      <option value="">Select warehouse</option>
                      <option
                        *ngFor="let warehouse of warehouseOptions()"
                        [value]="warehouse.warehouseCode"
                      >
                        {{ warehouse.warehouseName }}
                      </option>
                    </select>
                  </td>
                  <td class="itr-replacement-table__warehouse-col">
                    <select
                      class="pmm-replacement-table__input pmm-replacement-table__input--select"
                      [ngModel]="item.toWarehouseCode"
                      (ngModelChange)="updateReplacementToWarehouse(gi, ii, $event)"
                      [name]="'itrReplacementToWarehouse' + gi + '_' + ii"
                    >
                      <option value="">Select warehouse</option>
                      <option
                        *ngFor="let warehouse of warehouseOptions()"
                        [value]="warehouse.warehouseCode"
                      >
                        {{ warehouse.warehouseName }}
                      </option>
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="cjr-actions-footer itr-actions-footer">
      <button type="button" class="btn-secondary" (click)="back()">Cancel</button>
      <button type="button" class="cjr-submit-btn" (click)="save()" [disabled]="isSaving()">
        <span class="cjr-submit-icon">✓</span>
        {{
          isSaving()
            ? isCreateMode()
              ? 'Submitting...'
              : 'Updating...'
            : isCreateMode()
              ? 'Submit'
              : 'Update'
        }}
      </button>
    </div>
  </div>
</div>
