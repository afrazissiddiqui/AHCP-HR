<div class="itr-add-page cjr-page scd-add-page">
  <div class="itr-add-scroll">
    <div class="cjr-header itr-add-header">
      <div class="cjr-header-left">
        <button type="button" class="cjr-back" (click)="back()" aria-label="Back">
          <span class="cjr-back-icon">❮</span>
        </button>
        <h1>{{ pageTitle() }}</h1>
      </div>
    </div>

    <div class="cjr-card scd-form-card itr-form-card">
      <div class="cjr-personal" id="itr-form-header-section">
        <div class="cjr-section-title">ITR Form</div>

        <div class="cjr-personal-grid pmm-profile-grid itr-form-grid">
          <div class="cjr-personal-col">
            <div class="cjr-row itr-form-row">
              <label for="husky-machine-id">Machine ID:</label>
              <select
                id="husky-machine-id"
                class="mad-select itr-form-control"
                [ngModel]="machineId()"
                (ngModelChange)="onMachineIdChange($event)"
                name="machineId"
              >
                <option value="">Select machine</option>
                <option *ngFor="let machine of machineOptions()" [value]="machine.machineId">
                  {{ machine.machineId }} — {{ machine.machineName }}
                </option>
              </select>
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-machine-name">Machine Name:</label>
              <input
                id="husky-machine-name"
                type="text"
                class="itr-form-control itr-field--readonly"
                [ngModel]="machineName()"
                name="machineName"
                placeholder="Auto-populated from Machine ID"
                readonly
              />
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-maintenance-type">Maintenance Type:</label>
              <select
                id="husky-maintenance-type"
                class="mad-select itr-form-control"
                [ngModel]="maintenanceType()"
                (ngModelChange)="onMaintenanceTypeChange($event)"
                name="maintenanceType"
              >
                <option value="">Select maintenance type</option>
                <option *ngFor="let option of maintenanceTypeOptions" [value]="option">
                  {{ option }}
                </option>
              </select>
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-maintenance-frequency">Maintenance Frequency:</label>
              <select
                id="husky-maintenance-frequency"
                class="mad-select itr-form-control"
                [ngModel]="maintenanceFrequency()"
                (ngModelChange)="onMaintenanceFrequencyChange($event)"
                name="maintenanceFrequency"
              >
                <option value="">Select maintenance frequency</option>
                <option *ngFor="let option of maintenanceFrequencyOptions" [value]="option">
                  {{ option }}
                </option>
              </select>
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-posting-date">Posting Date:</label>
              <input
                id="husky-posting-date"
                type="date"
                class="itr-form-control"
                [ngModel]="postingDate()"
                (ngModelChange)="onPostingDateChange($event)"
                name="postingDate"
              />
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-due-date">Due Date:</label>
              <input
                id="husky-due-date"
                type="date"
                class="itr-form-control"
                [ngModel]="dueDate()"
                (ngModelChange)="onDueDateChange($event)"
                name="dueDate"
              />
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-doc-date">Doc Date:</label>
              <input
                id="husky-doc-date"
                type="date"
                class="itr-form-control"
                [ngModel]="docDate()"
                (ngModelChange)="onDocDateChange($event)"
                name="docDate"
              />
            </div>
          </div>

          <div class="cjr-personal-col">
            <div class="cjr-row itr-form-row">
              <label for="husky-serial-no">SN# (Machine Serial No.):</label>
              <input
                id="husky-serial-no"
                type="text"
                class="itr-form-control"
                [ngModel]="serialNo()"
                (ngModelChange)="serialNo.set($event)"
                name="serialNo"
                placeholder="Enter machine serial number"
              />
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-mold-no">Mold #:</label>
              <input
                id="husky-mold-no"
                type="text"
                class="itr-form-control"
                [ngModel]="moldNo()"
                (ngModelChange)="moldNo.set($event)"
                name="moldNo"
                placeholder="Enter mold number"
              />
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-hot-runner-job-no">Hot Runner Job #:</label>
              <input
                id="husky-hot-runner-job-no"
                type="text"
                class="itr-form-control"
                [ngModel]="hotRunnerJobNo()"
                (ngModelChange)="hotRunnerJobNo.set($event)"
                name="hotRunnerJobNo"
                placeholder="Enter hot runner job number"
              />
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-hour-meter-reading">Hour Meter Reading:</label>
              <input
                id="husky-hour-meter-reading"
                type="text"
                class="itr-form-control"
                [ngModel]="hourMeterReading()"
                (ngModelChange)="hourMeterReading.set($event)"
                name="hourMeterReading"
                placeholder="Enter hour meter reading"
              />
            </div>
          </div>

          <div class="cjr-personal-col">
            <div class="cjr-row itr-form-row">
              <label for="husky-robot-serial-no">Robot Serial #:</label>
              <input
                id="husky-robot-serial-no"
                type="text"
                class="itr-form-control"
                [ngModel]="robotSerialNo()"
                (ngModelChange)="robotSerialNo.set($event)"
                name="robotSerialNo"
                placeholder="Enter robot serial number"
              />
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-inspector">Inspector:</label>
              <select
                id="husky-inspector"
                class="mad-select itr-form-control"
                [ngModel]="inspector()"
                (ngModelChange)="onInspectorChange($event)"
                name="inspector"
              >
                <option value="">Select inspector</option>
                <option *ngFor="let user of inspectorUsers()" [value]="user.displayName">
                  {{ user.displayName }}
                </option>
              </select>
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-inspection-date">Inspection Date:</label>
              <input
                id="husky-inspection-date"
                type="date"
                class="itr-form-control"
                [ngModel]="inspectionDate()"
                (ngModelChange)="onInspectionDateChange($event)"
                name="inspectionDate"
              />
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-from-warehouse">From Warehouse:</label>
              <select
                id="husky-from-warehouse"
                class="mad-select itr-form-control"
                [ngModel]="fromWarehouseCode()"
                (ngModelChange)="onFromWarehouseChange($event)"
                name="fromWarehouseCode"
              >
                <option value="">Select warehouse</option>
                <option
                  *ngFor="let warehouse of warehouseOptions()"
                  [value]="warehouse.warehouseCode"
                >
                  {{ warehouse.warehouseName }}
                </option>
              </select>
            </div>

            <div class="cjr-row itr-form-row">
              <label for="husky-to-warehouse">To Warehouse:</label>
              <select
                id="husky-to-warehouse"
                class="mad-select itr-form-control"
                [ngModel]="toWarehouseCode()"
                (ngModelChange)="onToWarehouseChange($event)"
                name="toWarehouseCode"
              >
                <option value="">Select warehouse</option>
                <option
                  *ngFor="let warehouse of warehouseOptions()"
                  [value]="warehouse.warehouseCode"
                >
                  {{ warehouse.warehouseName }}
                </option>
              </select>
            </div>

            <div class="cjr-row itr-form-row" *ngIf="!isCreateMode()">
              <label for="husky-submit-date">Submit Date:</label>
              <input
                id="husky-submit-date"
                type="text"
                class="itr-form-control itr-field--readonly"
                [ngModel]="submitDate()"
                name="submitDate"
                readonly
                placeholder="System-generated on submit"
              />
            </div>

            <div class="cjr-row itr-form-row" *ngIf="!isCreateMode()">
              <label for="husky-document-no">Document No.:</label>
              <input
                id="husky-document-no"
                type="text"
                class="itr-form-control itr-field--readonly"
                [ngModel]="documentNo()"
                name="documentNo"
                readonly
                placeholder="Auto-generated"
              />
            </div>

            <div class="cjr-row itr-form-row" *ngIf="!isCreateMode()">
              <label for="husky-status">Status:</label>
              <input
                id="husky-status"
                type="text"
                class="itr-form-control itr-field--readonly"
                [ngModel]="status()"
                name="status"
                readonly
                placeholder="System-driven workflow"
              />
            </div>
          </div>
        </div>

        <div class="cjr-row itr-form-row itr-form-row--remarks">
          <label for="husky-remarks">Remarks:</label>
          <textarea
            id="husky-remarks"
            class="mad-textarea itr-form-control itr-form-remarks"
            [ngModel]="remarks()"
            (ngModelChange)="remarks.set($event)"
            name="remarks"
            rows="3"
            placeholder="Enter remarks"
          ></textarea>
        </div>
      </div>
    </div>

    <div
      class="cjr-card scd-form-card itr-replacement-card"
      *ngIf="replacementLineGroups().length > 0"
    >
      <div class="cjr-personal itr-replacement-card__body">
        <div class="cjr-section-title">Replacement Items</div>

        <div
          class="itr-replacement-line-block"
          *ngFor="let group of replacementLineGroups(); let gi = index; trackBy: trackByIndex"
        >
          <div class="itr-replacement-line-block__head">
            <span class="itr-replacement-line-block__index">{{ gi + 1 }}</span>
            <div class="itr-replacement-line-block__head-text">
              <span class="itr-replacement-line-block__title">
                {{ group.componentName || 'Inspection Line' }}
              </span>
              <span class="itr-replacement-line-block__subtitle" *ngIf="group.itemsToBeInspected">
                {{ group.itemsToBeInspected }}
              </span>
              <span class="itr-replacement-line-block__subtitle" *ngIf="group.whatToCheck">
                {{ group.whatToCheck }}
              </span>
            </div>
          </div>

          <div class="pmm-replacement-table-wrap itr-replacement-table-wrap">
            <table class="mountain-table pmm-replacement-table itr-replacement-table">
              <thead>
                <tr>
                  <th>Item Code</th>
                  <th>Item Name</th>
                  <th class="pmm-replacement-table__qty-col">Quantity</th>
                  <th class="itr-replacement-table__warehouse-col">From Warehouse</th>
                  <th class="itr-replacement-table__warehouse-col">To Warehouse</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of group.items; let ii = index; trackBy: trackByIndex">
                  <td>
                    <span class="itr-replacement-table__readonly">{{ item.itemCode || '—' }}</span>
                  </td>
                  <td>
                    <span class="itr-replacement-table__readonly">{{ item.itemName || '—' }}</span>
                  </td>
                  <td class="pmm-replacement-table__qty-col">
                    <input
                      type="number"
                      min="0"
                      step="any"
                      class="pmm-replacement-table__input pmm-replacement-table__input--qty itr-form-control"
                      [ngModel]="item.quantity"
                      (ngModelChange)="updateReplacementQuantity(gi, ii, $event)"
                      placeholder="Qty"
                      [name]="'itrReplacementQuantity' + gi + '_' + ii"
                    />
                  </td>
                  <td class="itr-replacement-table__warehouse-col">
                    <select
                      class="mad-select itr-replacement-table__warehouse-select itr-form-control"
                      [ngModel]="item.fromWarehouseCode"
                      (ngModelChange)="updateReplacementFromWarehouse(gi, ii, $event)"
                      [name]="'itrReplacementFromWarehouse' + gi + '_' + ii"
                    >
                      <option value="">Select warehouse</option>
                      <option
                        *ngFor="let warehouse of warehouseOptions()"
                        [value]="warehouse.warehouseCode"
                      >
                        {{ warehouse.warehouseName }}
                      </option>
                    </select>
                  </td>
                  <td class="itr-replacement-table__warehouse-col">
                    <select
                      class="mad-select itr-replacement-table__warehouse-select itr-form-control"
                      [ngModel]="item.toWarehouseCode"
                      (ngModelChange)="updateReplacementToWarehouse(gi, ii, $event)"
                      [name]="'itrReplacementToWarehouse' + gi + '_' + ii"
                    >
                      <option value="">Select warehouse</option>
                      <option
                        *ngFor="let warehouse of warehouseOptions()"
                        [value]="warehouse.warehouseCode"
                      >
                        {{ warehouse.warehouseName }}
                      </option>
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="cjr-actions-footer itr-actions-footer">
      <button type="button" class="btn-secondary" (click)="back()">Cancel</button>
      <button type="button" class="cjr-submit-btn" (click)="save()" [disabled]="isSaving()">
        <span class="cjr-submit-icon">✓</span>
        {{
          isSaving()
            ? isCreateMode()
              ? 'Submitting...'
              : 'Updating...'
            : isCreateMode()
              ? 'Submit'
              : 'Update'
        }}
      </button>
    </div>
  </div>
</div>
