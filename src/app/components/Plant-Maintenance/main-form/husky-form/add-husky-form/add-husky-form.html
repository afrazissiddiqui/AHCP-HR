<div class="cjr-page scd-add-page">
  <div class="cjr-header">
    <div class="cjr-header-left">
      <button type="button" class="cjr-back" (click)="back()" aria-label="Back">
        <span class="cjr-back-icon">❮</span>
      </button>
      <h1>{{ pageTitle() }}</h1>
    </div>
  </div>

  <div class="cjr-card scd-form-card">
    <div class="cjr-personal" id="husky-form-section">
      <div class="cjr-section-title">Husky Form</div>

      <div class="cjr-personal-grid pmm-profile-grid">
        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label for="husky-machine-id">Machine ID:</label>
            <select
              id="husky-machine-id"
              class="mad-select"
              [ngModel]="machineId()"
              (ngModelChange)="onMachineIdChange($event)"
              name="machineId"
            >
              <option value="">Select machine</option>
              <option *ngFor="let machine of machineOptions" [value]="machine.machineId">
                {{ machine.machineId }} — {{ machine.machineName }}
              </option>
            </select>
          </div>

          <div class="cjr-row">
            <label for="husky-machine-name">Machine Name:</label>
            <input
              id="husky-machine-name"
              type="text"
              [ngModel]="machineName()"
              name="machineName"
              placeholder="Auto-populated from Machine ID"
              readonly
            />
          </div>

          <div class="cjr-row">
            <label for="husky-maintenance-type">Maintenance Type:</label>
            <select
              id="husky-maintenance-type"
              class="mad-select"
              [ngModel]="maintenanceType()"
              (ngModelChange)="onMaintenanceTypeChange($event)"
              name="maintenanceType"
            >
              <option value="">Select maintenance type</option>
              <option *ngFor="let option of maintenanceTypeOptions" [value]="option">
                {{ option }}
              </option>
            </select>
          </div>

          <div class="cjr-row">
            <label for="husky-maintenance-frequency">Maintenance Frequency:</label>
            <select
              id="husky-maintenance-frequency"
              class="mad-select"
              [ngModel]="maintenanceFrequency()"
              (ngModelChange)="onMaintenanceFrequencyChange($event)"
              name="maintenanceFrequency"
            >
              <option value="">Select maintenance frequency</option>
              <option *ngFor="let option of maintenanceFrequencyOptions" [value]="option">
                {{ option }}
              </option>
            </select>
          </div>
        </div>

        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label for="husky-serial-no">SN# (Machine Serial No.):</label>
            <input
              id="husky-serial-no"
              type="text"
              [ngModel]="serialNo()"
              (ngModelChange)="serialNo.set($event)"
              name="serialNo"
              placeholder="Enter machine serial number"
            />
          </div>

          <div class="cjr-row">
            <label for="husky-mold-no">Mold #:</label>
            <input
              id="husky-mold-no"
              type="text"
              [ngModel]="moldNo()"
              (ngModelChange)="moldNo.set($event)"
              name="moldNo"
              placeholder="Enter mold number"
            />
          </div>

          <div class="cjr-row">
            <label for="husky-hot-runner-job-no">Hot Runner Job #:</label>
            <input
              id="husky-hot-runner-job-no"
              type="text"
              [ngModel]="hotRunnerJobNo()"
              (ngModelChange)="hotRunnerJobNo.set($event)"
              name="hotRunnerJobNo"
              placeholder="Enter hot runner job number"
            />
          </div>

          <div class="cjr-row">
            <label for="husky-hour-meter-reading">Hour Meter Reading:</label>
            <input
              id="husky-hour-meter-reading"
              type="text"
              [ngModel]="hourMeterReading()"
              (ngModelChange)="hourMeterReading.set($event)"
              name="hourMeterReading"
              placeholder="Enter hour meter reading"
            />
          </div>
        </div>

        <div class="cjr-personal-col">
          <div class="cjr-row">
            <label for="husky-robot-serial-no">Robot Serial #:</label>
            <input
              id="husky-robot-serial-no"
              type="text"
              [ngModel]="robotSerialNo()"
              (ngModelChange)="robotSerialNo.set($event)"
              name="robotSerialNo"
              placeholder="Enter robot serial number"
            />
          </div>

          <div class="cjr-row">
            <label for="husky-inspector">Inspector:</label>
            <select
              id="husky-inspector"
              class="mad-select"
              [ngModel]="inspector()"
              (ngModelChange)="onInspectorChange($event)"
              name="inspector"
            >
              <option value="">Select inspector</option>
              <option *ngFor="let user of inspectorUsers" [value]="user.displayName">
                {{ user.displayName }}
              </option>
            </select>
          </div>

          <div class="cjr-row">
            <label for="husky-inspection-date">Inspection Date:</label>
            <input
              id="husky-inspection-date"
              type="date"
              [ngModel]="inspectionDate()"
              (ngModelChange)="onInspectionDateChange($event)"
              name="inspectionDate"
            />
          </div>

          <div class="cjr-row" *ngIf="!isCreateMode()">
            <label for="husky-submit-date">Submit Date:</label>
            <input
              id="husky-submit-date"
              type="text"
              [ngModel]="submitDate()"
              name="submitDate"
              readonly
              placeholder="System-generated on submit"
            />
          </div>

          <div class="cjr-row" *ngIf="!isCreateMode()">
            <label for="husky-document-no">Document No.:</label>
            <input
              id="husky-document-no"
              type="text"
              [ngModel]="documentNo()"
              name="documentNo"
              readonly
              placeholder="Auto-generated"
            />
          </div>

          <div class="cjr-row" *ngIf="!isCreateMode()">
            <label for="husky-status">Status:</label>
            <input
              id="husky-status"
              type="text"
              [ngModel]="status()"
              name="status"
              readonly
              placeholder="System-driven workflow"
            />
          </div>
        </div>
      </div>

      <p class="mad-components-hint" *ngIf="isCreateMode()">
        Submit Date, Document No., and Status are generated automatically when you save this form.
      </p>

      <div class="cjr-actions-footer">
        <button type="button" class="btn-secondary" (click)="back()">Cancel</button>
        <button type="button" class="cjr-submit-btn" (click)="save()">
          <span class="cjr-submit-icon">✓</span>
          {{ isCreateMode() ? 'Submit' : 'Update' }}
        </button>
      </div>
    </div>
  </div>
</div>
