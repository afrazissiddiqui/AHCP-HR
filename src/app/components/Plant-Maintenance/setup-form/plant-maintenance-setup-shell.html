<div class="plant-maintenance-setup-layout">
  @if (showSidebar()) {
    <app-sidebar
      [title]="'Forms'"
      [items]="sidebarItems"
      [sections]="sidebarSections"
      [isCollapsed]="layout.sidebarCollapsed()"
      [activeItemId]="activeSidebarItemId()"
      (folderSelected)="onFolderSelected($event)"
      (collapsedChange)="layout.sidebarCollapsed.set($event)"
    ></app-sidebar>
  }

  <div
    class="plant-maintenance-setup-content"
    [class.plant-maintenance-setup-content--full]="!showSidebar()"
  >
    <router-outlet />
  </div>
</div>
