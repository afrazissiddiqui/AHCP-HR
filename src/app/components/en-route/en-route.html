<div class="en-route-container">
  <!-- Header -->
  <div class="header">
    <h1>Recuirment</h1>
    <span class="info-icon" title="Information">ⓘ</span>
  </div>

  <!-- Filters Section -->
  <div class="filters-section">
    <div class="filter-row">
      <div class="filter-group">
        <label>Template:</label>
        <select [(ngModel)]="template">
          <option value="All">All</option>
          <option value="Template1">Template 1</option>
          <option value="Template2">Template 2</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Current Step:</label>
        <select [(ngModel)]="currentStep">
          <option value="All">All</option>
          <option value="Step1">Step 1</option>
          <option value="Step2">Step 2</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Group: <span class="info-icon">ⓘ</span></label>
        <select [(ngModel)]="group">
          <option value="All">All</option>
          <option value="Group1">Group 1</option>
          <option value="Group2">Group 2</option>
        </select>
      </div>

      <div class="filter-group">
        <label>All or Reports Only:</label>
        <select [(ngModel)]="allOrReportsOnly">
          <option value="All Planners">All Planners</option>
          <option value="Reports Only">Reports Only</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Planner:</label>
        <div class="search-input-wrapper">
          <input 
            type="text" 
            [(ngModel)]="planner"
            placeholder="Search for employ..."
            class="search-input"
          />
          <span class="search-icon">🔗</span>
        </div>
      </div>

      <div class="filter-group">
        <label>Division:</label>
        <select [(ngModel)]="division">
          <option value="All">All</option>
          <option value="Division1">Division 1</option>
          <option value="Division2">Division 2</option>
        </select>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-group">
        <label>Department:</label>
        <select [(ngModel)]="department">
          <option value="All">All</option>
          <option value="Dept1">Department 1</option>
          <option value="Dept2">Department 2</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Location:</label>
        <select [(ngModel)]="location">
          <option value="All">All</option>
          <option value="Location1">Location 1</option>
          <option value="Location2">Location 2</option>
        </select>
      </div>

      <div class="buttons-group">
        <button class="go-btn" (click)="goClick()">Go</button>
        <button class="reset-btn" (click)="resetClick()">Reset</button>
      </div>
    </div>
  </div>

  <!-- Forms Table Section -->
  <div class="table-section">
    <div class="table-header">
      <h2>Forms ({{ formRows().length }})</h2>
      <span class="settings-icon">⚙</span>
    </div>

    <div class="table-wrapper">
      <table class="forms-table">
        <thead>
          <tr>
            <th class="col-title">Title</th>
            <th class="col-employee">Employee</th>
            <th class="col-current-step">Current Step</th>
            <th class="col-currently-with">Currently With</th>
            <th class="col-step-due-date">Step Due Date</th>
          </tr>
        </thead>
        <tbody>
          @for (row of formRows(); track row.title) {
            <tr>
              <td class="col-title">
                <span class="lock-icon">🔒</span>
                <a href="javascript:void(0)" (click)="viewForm(row.title)" class="form-link">{{ row.title }}</a>
              </td>
              <td class="col-employee">
                {{ row.employee }}
                <span class="user-icon">👤</span>
              </td>
              <td class="col-current-step">{{ row.currentStep }}</td>
              <td class="col-currently-with">{{ row.currentlyWith }}</td>
              <td class="col-step-due-date">{{ row.stepDueDate }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
