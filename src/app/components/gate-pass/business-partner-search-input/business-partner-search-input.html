<div class="gp-item-search-wrap">
  <input
    [id]="inputId || null"
    type="search"
    role="combobox"
    [attr.aria-expanded]="suggestionsOpen"
    aria-autocomplete="list"
    [ngModel]="value"
    (ngModelChange)="onInput($event)"
    (focus)="openSuggestions()"
    (blur)="onBlur()"
    [placeholder]="placeholder"
    [readonly]="disabled"
    autocomplete="off"
  />
  <ul class="gp-item-suggestions" role="listbox" *ngIf="suggestionsOpen && value.trim()">
    <li *ngIf="loadingSuggestions" class="gp-item-suggestion-empty" role="presentation">
      Loading business partners…
    </li>
    <ng-container *ngIf="!loadingSuggestions">
      <li
        *ngFor="let partner of suggestions"
        role="option"
        class="gp-item-suggestion-item"
        (mousedown)="selectPartner(partner)"
      >
        <span class="gp-item-suggestion-primary">{{ partner.code }} — {{ partner.name }}</span>
      </li>
      <li *ngIf="suggestions.length === 0" class="gp-item-suggestion-empty" role="presentation">
        No matching business partners
      </li>
    </ng-container>
  </ul>
</div>
