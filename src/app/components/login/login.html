<div class="login-page">
  <div class="login-panel">
    <div class="login-brand">
      <img class="login-logo" src="assets/logo.png" alt="Company logo" width="120" height="auto" />
      <!-- <h1 class="login-title">Along HCC</h1> -->
      <p class="login-subtitle">HRMS Web Portal</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()" autocomplete="on">
      <label class="login-field">
        <span class="login-label">User ID</span>
        <input
          type="text"
          name="userId"
          [(ngModel)]="userId"
          placeholder="Enter your user ID"
          autocapitalize="none"
          autocomplete="username"
        />
      </label>

      <label class="login-field">
        <span class="login-label">Password</span>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
      </label>

      <div class="login-row">
        <label class="login-remember">
          <input type="checkbox" [(ngModel)]="rememberMe" name="remember" />
          <span>Remember me</span>
        </label>
        <button type="button" class="login-link" (click)="goDashboard()">Skip for now</button>
      </div>

      <button type="submit" class="login-submit">Sign in</button>
    </form>

    <p class="login-footnote">Use any non-empty User ID and Password for this demo.</p>
  </div>
</div>
