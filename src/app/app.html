@if (showMainChrome()) {
<div class="header-wrapper" #headerWrapper>
  <ui5-shellbar
    [attr.primary-title]="shellbarTitle()"
    secondary-title=""
    show-product-switch
    show-nav-button
    show-menu-button
    (click)="onShellbarClick($event)"
    (product-switch-click)="onProductSwitchClick($event)"
    (profile-click)="onProfileShellbarClick($event)"
    class="hr-portal-header"
  >
    <!-- Logo -->
    <img slot="logo" src="assets/logo.png" (click)="onLogoClick($event)" />

    <!-- Profile (slot content; toggle via shellbar profile-click) -->
    <span slot="profile" class="profile-trigger" data-profile-btn title="Account">
      <ui5-avatar [attr.initials]="profileAvatarInitials()"></ui5-avatar>
    </span>

    <!-- Search -->
    <ui5-input
      slot="searchField"
      placeholder="Search"
    ></ui5-input>

    <ui5-shellbar-item
      slot="items"
      icon="validate"
      text="Approval authority setup"
      count="2"
      (click)="onApprovalAuthoritySetupClick($event)"
    ></ui5-shellbar-item>
  </ui5-shellbar>

  @if (profileDropdownOpen()) {
    <div class="profile-dropdown-menu" (click)="stopEvent($event)" role="menu">
      <button type="button" class="profile-dropdown-item" (click)="onViewProfile($event)" role="menuitem">
        <ui5-icon class="profile-dropdown-icon" name="employee"></ui5-icon>
        <span>View profile</span>
      </button>
      <button type="button" class="profile-dropdown-item profile-dropdown-item--logout" (click)="onSignOut($event)" role="menuitem">
        <ui5-icon class="profile-dropdown-icon" name="log"></ui5-icon>
        <span>Sign out</span>
      </button>
    </div>
  }

  <!-- HR Portal Dropdown Menu -->
  @if (hrDropdownOpen()) {
    <div
      class="hr-dropdown-menu"
      (mouseleave)="clearPreviewHrOption()"
      (click)="stopEvent($event)"
    >
      @for (option of hrMenuOptions; track option.value) {
        <div class="hr-dropdown-group">
          <button
            class="hr-dropdown-item"
            [class.is-selected]="isHrOptionSelected(option)"
            [class.has-children]="option.children?.length"
            [class.is-expanded]="isHrOptionExpanded(option)"
            (click)="selectHrOption(option, $event)"
            (mouseenter)="previewHrOption(option.label)"
            type="button"
          >
            <ui5-icon class="hr-dropdown-icon" [attr.name]="option.icon"></ui5-icon>
            <span class="hr-dropdown-label">{{ option.label }}</span>
            @if (option.children?.length) {
              <ui5-icon class="hr-dropdown-chevron" name="slim-arrow-right"></ui5-icon>
            }
          </button>
          @if (option.children?.length && isHrOptionExpanded(option)) {
            <div class="hr-dropdown-submenu">
              @for (child of option.children; track child.value) {
                <button
                  class="hr-dropdown-item hr-dropdown-item--child"
                  [class.is-selected]="isHrOptionSelected(child)"
                  (click)="selectHrOption(child, $event)"
                  (mouseenter)="previewHrOption(child.label)"
                  type="button"
                >
                  <ui5-icon class="hr-dropdown-icon" [attr.name]="child.icon"></ui5-icon>
                  <span class="hr-dropdown-label">{{ child.label }}</span>
                </button>
              }
            </div>
          }
        </div>
      }
    </div>
  }
</div>
}

<app-view-profile [open]="profileDrawerOpen()" (closed)="onProfileDrawerClosed()" />

<main class="app-content" [class.app-content--bare]="!showMainChrome()">
  <router-outlet />
</main>
