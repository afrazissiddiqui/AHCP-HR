
<div class="header-wrapper" #headerWrapper>
  <ui5-shellbar
    [attr.primary-title]="shellbarTitle()"
    secondary-title=""
    show-notifications
    notifications-count="2"
    show-product-switch
    show-nav-button
    show-menu-button
    (click)="onShellbarClick($event)"
    (notifications-click)="onNotificationsClick($event)"
    class="hr-portal-header"
  >
    <!-- Logo -->
    <img slot="logo" src="assets/logo.png" (click)="onLogoClick($event)" />

    <!-- Profile -->
    <ui5-avatar slot="profile" initials="UI"></ui5-avatar>

    <!-- Search -->
    <ui5-input
      slot="searchField"
      placeholder="Search"
    ></ui5-input>
  </ui5-shellbar>

  <!-- HR Portal Dropdown Menu -->
  @if (hrDropdownOpen()) {
    <div
      class="hr-dropdown-menu"
      (mouseleave)="clearPreviewHrOption()"
      (click)="stopEvent($event)"
    >
      @for (option of hrMenuOptions; track option.value) {
        <button
          class="hr-dropdown-item"
          [class.is-selected]="option.value === selectedHrOption()"
          (click)="selectHrOption(option, $event)"
          (mouseenter)="previewHrOption(option.label)"
          type="button"
        >
          <ui5-icon class="hr-dropdown-icon" [attr.name]="option.icon"></ui5-icon>
          <span class="hr-dropdown-label">{{ option.label }}</span>
        </button>
      }
    </div>
  }
</div>

<main class="app-content">
  <router-outlet />
</main>
