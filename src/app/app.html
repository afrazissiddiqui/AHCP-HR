@if (showMainChrome()) {
<div class="header-wrapper" #headerWrapper>
  <ui5-shellbar
    [attr.primary-title]="shellbarTitle()"
    secondary-title=""
    show-notifications
    notifications-count="2"
    show-product-switch
    show-nav-button
    show-menu-button
    (click)="onShellbarClick($event)"
    (product-switch-click)="onProductSwitchClick($event)"
    (notifications-click)="onNotificationsClick($event)"
    class="hr-portal-header"
  >
    <!-- Logo -->
    <img slot="logo" src="assets/logo.png" (click)="onLogoClick($event)" />

    <!-- Profile -->
    <span
      slot="profile"
      class="profile-trigger"
      data-profile-btn
      (click)="onProfileTriggerClick($event)"
      title="Account"
    >
      <ui5-avatar initials="UI"></ui5-avatar>
    </span>

    <!-- Search -->
    <ui5-input
      slot="searchField"
      placeholder="Search"
    ></ui5-input>
  </ui5-shellbar>

  @if (profileDropdownOpen()) {
    <div class="profile-dropdown-menu" (click)="stopEvent($event)" role="menu">
      <button type="button" class="profile-dropdown-item" (click)="onEditProfile($event)" role="menuitem">
        <ui5-icon class="profile-dropdown-icon" name="employee"></ui5-icon>
        <span>Edit profile</span>
      </button>
      <button type="button" class="profile-dropdown-item profile-dropdown-item--logout" (click)="onLogout($event)" role="menuitem">
        <ui5-icon class="profile-dropdown-icon" name="log"></ui5-icon>
        <span>Logout</span>
      </button>
    </div>
  }

  <!-- HR Portal Dropdown Menu -->
  @if (hrDropdownOpen()) {
    <div
      class="hr-dropdown-menu"
      (mouseleave)="clearPreviewHrOption()"
      (click)="stopEvent($event)"
    >
      @for (option of hrMenuOptions; track option.value) {
        <button
          class="hr-dropdown-item"
          [class.is-selected]="option.value === selectedHrOption()"
          (click)="selectHrOption(option, $event)"
          (mouseenter)="previewHrOption(option.label)"
          type="button"
        >
          <ui5-icon class="hr-dropdown-icon" [attr.name]="option.icon"></ui5-icon>
          <span class="hr-dropdown-label">{{ option.label }}</span>
        </button>
      }
    </div>
  }
</div>
}

<main class="app-content" [class.app-content--bare]="!showMainChrome()">
  <router-outlet />
</main>
